<!DOCTYPE html>
<html>
<head>
    <title>PeakExplorer</title>
</head>
<body>
    <h1>Welcome to PeakExplorer!</h1>
    <p>Submit a peak below:</p>

    <form action="/" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="text" name="peak" placeholder="Peak Name" required>
        <button type="submit">Submit</button>
    </form>

    <h2>Submissions:</h2>
    <ul>
        {% for sub in submissions %}
            <li>{{ sub.name }} climbed {{ sub.peak }}</li>
        {% endfor %}
    </ul>
</body>
</html>
